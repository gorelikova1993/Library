<!DOCTYPE html>
<html lang="en"           xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <meta charset="UTF-8">
    <title>New Person</title>
</head>
<body>
<th:block  layout:fragment="content">
    <form th:method="POST" th:action="@{/people}" th:object="${person}">
        <label for="name">Введите ФИО: </label>
        <input type="text" th:field="*{name}" id="name"/>
        <div style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</div>
        <br/>
        <label for="birthYear">Введите год рождения:  </label>
        <input type="text" th:field="*{birthYear}" id="birthYear"/>
        <div style="color:red" th:if="${#fields.hasErrors('birthYear')}" th:errors="*{birthYear}">Birth year</div>
        <br/>
        <input type="submit" value="Создать!"/>
    </form>
</th:block>
</body>
</html>
